<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Dip Buddy — Deli floor expiration tracker">
  <title>Dip Buddy</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1 class="app-title">Dip Buddy</h1>
      <p class="app-subtitle">Deli Floor Tracker</p>
      <form id="login-form" novalidate>
        <div class="field-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            autocomplete="email"
            inputmode="email"
            placeholder="you@example.com"
            required
          >
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          >
        </div>
        <div id="login-error" class="error-message" aria-live="polite" hidden></div>
        <button type="submit" id="login-btn" class="btn btn-primary">Sign In</button>
      </form>
    </div>
  </div>

  <!-- APP SHELL (hidden until authenticated) -->
  <div id="app-shell" class="app-shell" hidden>

    <main id="view-container" class="view-container">

      <!-- Dashboard view -->
      <section id="view-dashboard" class="view active">
        <div id="urgent-banner" class="urgent-banner" hidden>
          <span id="urgent-text"></span>
        </div>
        <header class="dash-header">
          <h1 class="dash-title">Floor Items</h1>
          <button id="logout-btn" class="btn-icon" title="Sign out" aria-label="Sign out">&#10148;</button>
        </header>
        <div id="dash-loading" class="dash-loading">Loading&hellip;</div>
        <div id="item-list" class="item-list"></div>
        <div id="empty-state" class="empty-state" hidden>
          <p class="empty-icon">&#128717;</p>
          <p class="empty-msg">No items on the floor.</p>
          <p class="empty-hint">Tap <strong>+</strong> to add one.</p>
        </div>
      </section>

      <!-- Add Item view -->
      <section id="view-add-item" class="view" hidden>
        <header class="dash-header">
          <h1 class="dash-title">Add Item</h1>
          <button type="button" id="add-item-cancel" class="btn-icon" aria-label="Cancel">&#10005;</button>
        </header>

        <form id="add-item-form" novalidate>

          <!-- Barcode scan -->
          <div class="scan-row">
            <button type="button" id="scan-barcode-btn" class="btn btn-secondary scan-btn">
              &#128247; Scan Barcode
            </button>
          </div>
          <div id="scan-result" class="scan-result-banner" hidden>
            <span id="scan-status"></span>
            <button type="button" id="scan-clear" class="btn-text">Clear</button>
          </div>

          <div class="field-group">
            <label for="ai-product-name">Product Name <span class="required">*</span></label>
            <input type="text" id="ai-product-name"
              placeholder="e.g. Sabra Classic Hummus 10oz"
              autocomplete="off" required>
          </div>

          <div class="field-group">
            <label for="ai-exp-date">Expiration Date <span class="required">*</span></label>
            <input type="date" id="ai-exp-date" required>
            <div id="pull-date-preview" class="pull-preview" hidden>
              Pull by: <strong id="pull-date-display"></strong>
            </div>
          </div>

          <div class="field-group">
            <label for="ai-location">Location</label>
            <input type="text" id="ai-location"
              placeholder="e.g. Dips Case 2"
              autocomplete="off">
          </div>

          <div class="field-group">
            <label for="ai-quantity">Quantity</label>
            <input type="number" id="ai-quantity"
              placeholder="optional"
              min="1" inputmode="numeric">
          </div>

          <label class="toggle-row" for="ai-slow-mover">
            <span class="toggle-text">
              <span class="toggle-name">Slow Mover</span>
              <span class="toggle-hint">Pull in morning on pull date</span>
            </span>
            <span class="toggle-switch">
              <input type="checkbox" id="ai-slow-mover" class="toggle-input">
              <span class="toggle-track">
                <span class="toggle-thumb"></span>
              </span>
            </span>
          </label>

          <div class="field-group" style="margin-top:1rem">
            <label for="ai-notes">Notes</label>
            <textarea id="ai-notes" class="textarea"
              placeholder="optional"
              rows="2"></textarea>
          </div>

          <div id="add-item-error" class="error-message" hidden></div>

          <button type="submit" id="add-item-btn" class="btn btn-primary">Save Item</button>

        </form>
      </section>

      <!-- Products view -->
      <section id="view-products" class="view" hidden>
        <h2 style="margin-top:0">Products</h2>
        <p style="color:var(--text-secondary)">Coming in Step 9.</p>
      </section>

      <!-- Settings view -->
      <section id="view-settings" class="view" hidden>
        <h2 style="margin-top:0">Settings</h2>
        <p style="color:var(--text-secondary)">Coming in Step 10.</p>
      </section>

    </main>

    <!-- Barcode scanner overlay -->
    <div id="scanner-overlay" class="scanner-overlay" hidden>
      <div class="scanner-modal">
        <header class="scanner-header">
          <span class="scanner-title">Scan Barcode</span>
          <button type="button" id="scanner-close" class="btn-icon" aria-label="Close scanner">&#10005;</button>
        </header>
        <div class="scanner-viewport">
          <video id="scanner-video" class="scanner-video" autoplay muted playsinline></video>
          <div class="scanner-aim"></div>
        </div>
        <p class="scanner-hint">Point camera at product barcode</p>
        <div id="scanner-error" class="scanner-error" hidden></div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
      <a href="#dashboard" class="nav-item active" data-view="dashboard">
        <span class="nav-icon" aria-hidden="true">⊞</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#add-item" class="nav-item" data-view="add-item">
        <span class="nav-icon" aria-hidden="true">＋</span>
        <span class="nav-label">Add Item</span>
      </a>
      <a href="#products" class="nav-item" data-view="products">
        <span class="nav-icon" aria-hidden="true">◉</span>
        <span class="nav-label">Products</span>
      </a>
      <a href="#settings" class="nav-item" data-view="settings">
        <span class="nav-icon" aria-hidden="true">⚙</span>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

  </div>

  <!-- ZXing barcode scanner -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

  <!-- Firebase SDK v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- App scripts (load order is load-order dependent) -->
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/add-item.js"></script>
  <script src="js/products.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
